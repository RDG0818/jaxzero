# SMAX 3m scenario: 3 allies vs 3 scripted marine enemies.
# Usage: python train/muzero.py train=smax_3m model=smax mcts=smax
#
# Hyperparameters aligned with MaZero paper (SMAC settings).
# model=smax selects deeper nets, 3-head attention, and tight value support.
#
# Other common scenarios:
#   8m:    num_agents=8,  max_episode_steps=120
#   2s3z:  num_agents=5,  max_episode_steps=150  (2 stalkers + 3 zealots)
#   3s5z:  num_agents=8,  max_episode_steps=150

defaults:
  - default

env_name: 3m
num_agents: 3
max_episode_steps: 100  # JaxMARL HeuristicEnemySMAX 3m terminates at 100 steps

# --- MaZero paper SMAC hyperparameters ---
learning_rate: 5e-4      # paper uses 5e-4 constant
lr_warmup_steps: 0       # no warmup; paper uses constant LR
end_lr_factor: 1.0       # no decay (1.0 = constant LR)
n_step: 5                # paper uses 5; default 10 causes NaN on sparse SMAX rewards
warmup_episodes: 50
awpo_alpha: 1.0          # AWPO advantage temperature (MAZero paper value)

# Data actors: 3 actors × 4 envs = 12 parallel envs.
# Each actor claims 2 CPUs (@ray.remote(num_cpus=2)) and limits XLA to 2 threads,
# filling the machine without thrashing. 3 data + 1 reanalyze = 8 CPUs claimed,
# leaving ~4 for OS/learner dispatch/replay buffer.
num_actors: 3
num_envs_per_actor: 4
batch_size: 256
num_reanalyze_actors: 1  # 1 reanalyze actor; more starves data actors on 12-core machine
reanalyze_batch_size: 64   # was 256 — smaller batches reduce early-training interference
consistency_scale: 1.0   # was 0.25; prior 1.0 issues were before LR+AWPO fixes — try again
replay_buffer_size: 500000  # default 100k overwrites good episodes too fast (~30min to full refresh)
