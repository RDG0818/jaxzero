env_name: MPE_simple_spread_v3
num_agents: 3
num_episodes: 100000
warmup_episodes: 1000
log_interval: 100
num_actors: 6
max_episode_steps: 25
replay_buffer_size: 100000
replay_buffer_alpha: 0.6
replay_buffer_beta_start: 0.4
replay_buffer_beta_frames: 100000
batch_size: 256
learning_rate: 3e-4
param_update_interval: 100
end_lr_factor: 0.1
lr_warmup_steps: 5000
value_scale: 0.25
consistency_scale: 1.0
consistency_horizon: 1   # SPR multi-step horizon (1 = original k=1 only, 3 = k=1,2,3)
gradient_clip_norm: 5.0
unroll_steps: 5
n_step: 10
discount_gamma: 0.99
wandb_mode: disabled  # "online" or "disabled"
project_name: myzero1
checkpoint_dir: checkpoints
checkpoint_interval: 2500
num_envs_per_actor: 4  # parallel environments per DataActor
sync: false            # use synchronous training loop (simpler but ~2-3x slower)
ema_decay: 0.999       # EMA decay for target encoder (BYOL-style consistency loss)
num_reanalyze_actors: 1
reanalyze_batch_size: 256
debug: false
debug_interval: 100  # emit detailed debug logs every N learner training steps
awpo_alpha: 0.0      # AWPO temperature; 0.0 = disabled (plain BC loss)
