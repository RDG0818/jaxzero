# MCTS settings for SMAX, aligned with MaZero paper.
# Usage: python train/muzero.py train=smax_3m model=smax mcts=smax

defaults:
  - default

planner_mode: joint
num_simulations: 100   # paper uses 100
num_gumbel_samples: 10 # paper uses K=10 sampled joint actions per node; was 5
mcts_rho: 0.25         # keep top 75% of sims (MAZero paper value)
