model:
  hidden_state_size: 128
  value_support_size: 20
  reward_support_size: 5
  fc_representation_layers:
  - 128
  fc_dynamic_layers:
  - 128
  fc_reward_layers:
  - 32
  fc_value_layers:
  - 32
  fc_policy_layers:
  - 32
  attention_type: transformer
  attention_layers: 1
  attention_heads: 1
  dropout_rate: 0.1
  proj_hid: 256
  proj_out: 256
  pred_hid: 64
  pred_out: 256
  use_obs_normalization: false
mcts:
  planner_mode: joint
  num_simulations: 100
  max_depth_gumbel_search: 10
  num_gumbel_samples: 10
  dirichlet_alpha: 0.3
  dirichlet_fraction: 0.25
  independent_argmax: true
  use_root_communication: false
  mcts_rho: 0.75
  mcts_lambda: 0.8
train:
  env_name: MPE_simple_spread_v3
  num_agents: 3
  num_episodes: 50
  warmup_episodes: 10
  log_interval: 100
  num_actors: 1
  max_episode_steps: 25
  replay_buffer_size: 100000
  replay_buffer_alpha: 0.6
  replay_buffer_beta_start: 0.4
  replay_buffer_beta_frames: 100000
  batch_size: 256
  learning_rate: 0.0003
  param_update_interval: 100
  end_lr_factor: 0.1
  lr_warmup_steps: 5000
  value_scale: 0.25
  consistency_scale: 1.0
  consistency_horizon: 1
  gradient_clip_norm: 5.0
  unroll_steps: 5
  n_step: 10
  discount_gamma: 0.99
  wandb_mode: disabled
  project_name: myzero1
  checkpoint_dir: checkpoints
  checkpoint_interval: 2500
  num_envs_per_actor: 4
  sync: false
  ema_decay: 0.999
  num_reanalyze_actors: 1
  reanalyze_batch_size: 256
  debug: false
  debug_interval: 100
  awpo_alpha: 0.0
